<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#1a1a2e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="记账">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="assets/icon-192.svg">
  <title>记账</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://unpkg.com/dexie@4.0.10/dist/dexie.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.8/dist/chart.umd.min.js"></script>
</head>
<body>

<!-- 头部 -->
<header id="header">
  <h1 id="header-title">记账</h1>
</header>

<!-- Tab 1: 记账 -->
<main id="tab-record" class="tab-page active">
  <div class="input-area">
    <button id="voice-btn" class="voice-btn" title="语音录入">🎤</button>
    <input type="text" id="record-input" placeholder="记一笔… 如「午饭35 打车20」" autocomplete="off" enterkeyhint="done">
    <button id="record-submit" class="btn-primary">记</button>
  </div>
  <div id="parse-preview" class="card hidden">
    <div class="preview-header">
      <span id="preview-category"></span>
      <span id="preview-amount"></span>
    </div>
    <div class="preview-detail">
      <span id="preview-note"></span>
      <span id="preview-date"></span>
    </div>
    <div class="preview-actions">
      <button id="preview-confirm" class="btn-primary btn-sm">确认记账</button>
      <button id="preview-cancel" class="btn-secondary btn-sm">取消</button>
    </div>
  </div>
  <div id="quick-record" class="quick-record">
    <div class="quick-amount">
      <input type="text" id="quick-amount" placeholder="金额" inputmode="decimal">
      <span>元</span>
    </div>
    <div class="quick-cats" id="quick-cats"></div>
    <button id="quick-record-btn" class="btn-primary btn-sm">快速记一笔</button>
  </div>
  <div class="section-label">今日流水</div>
  <div id="today-list" class="transaction-list"></div>
  <div class="section-label">最近</div>
  <div id="recent-list" class="transaction-list"></div>
</main>

<!-- Tab 2: 统计 -->
<main id="tab-stats" class="tab-page">
  <!-- 时间选择器 -->
  <div class="time-selector">
    <select id="sel-year" class="sel"></select>
    <span class="sel-label">年</span>
    <select id="sel-month" class="sel">
      <option value="0">全年</option>
      <option value="1">1月</option><option value="2">2月</option><option value="3">3月</option>
      <option value="4">4月</option><option value="5">5月</option><option value="6">6月</option>
      <option value="7">7月</option><option value="8">8月</option><option value="9">9月</option>
      <option value="10">10月</option><option value="11">11月</option><option value="12">12月</option>
    </select>
    <span class="sel-label">月</span>
  </div>

  <!-- 总览卡片 -->
  <div class="stats-summary">
    <div class="stat-card">
      <div class="stat-label" id="stat-total-label">本年支出</div>
      <div id="stat-total" class="stat-value">¥0.00</div>
    </div>
    <div class="stat-card">
      <div class="stat-label" id="stat-month-label">本月支出</div>
      <div id="stat-month-val" class="stat-value">¥0.00</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">日均支出</div>
      <div id="stat-daily-avg" class="stat-value">¥0.00</div>
    </div>
  </div>

  <!-- 分类明细 -->
  <div class="chart-container">
    <div class="chart-label">分类明细</div>
    <div id="category-breakdown" class="category-breakdown"></div>
  </div>

  <!-- 饼图 -->
  <div class="chart-container">
    <div class="chart-label">分类占比</div>
    <canvas id="chart-pie"></canvas>
  </div>

  <!-- 折线图 -->
  <div class="chart-container">
    <div class="chart-label">每日支出趋势</div>
    <canvas id="chart-line"></canvas>
  </div>
</main>

<!-- Tab 3: 设置 -->
<main id="tab-settings" class="tab-page">
  <div class="settings-section">
    <div class="section-title">支出分类</div>
    <div id="cat-list-expense" class="cat-list"></div>
    <div class="add-cat">
      <input type="text" id="new-cat-name" placeholder="新分类名称">
      <button id="new-cat-icon-btn" class="icon-pick-btn" title="选择图标">📌</button>
      <button id="add-cat-btn" class="btn-primary btn-sm">添加</button>
    </div>
  </div>

  <!-- 图标选择弹窗 -->
  <div id="icon-picker" class="icon-picker-overlay hidden">
    <div class="icon-picker-panel">
      <div class="icon-picker-header">
        <span>选择图标</span>
        <button id="icon-picker-close" class="btn-close">✕</button>
      </div>
      <div class="icon-picker-grid" id="icon-picker-grid"></div>
      <div class="icon-picker-upload">
        <button id="icon-upload-btn" class="btn-secondary btn-sm">📷 上传本地图片</button>
        <input type="file" id="icon-upload-file" accept="image/*" class="hidden">
      </div>
    </div>
  </div>

  <div class="settings-section">
    <div class="section-title">数据</div>
    <button id="export-csv" class="btn-secondary">导出 CSV</button>
    <button id="export-json" class="btn-secondary">导出 JSON 备份</button>
    <button id="import-json" class="btn-secondary">恢复 JSON 备份</button>
    <input type="file" id="import-file" accept=".json" class="hidden">
  </div>
</main>

<!-- 底部导航 -->
<nav id="bottom-nav">
  <button class="nav-btn active" data-tab="record">
    <span class="nav-icon">📝</span>
    <span class="nav-label">记账</span>
  </button>
  <button class="nav-btn" data-tab="stats">
    <span class="nav-icon">📊</span>
    <span class="nav-label">统计</span>
  </button>
  <button class="nav-btn" data-tab="settings">
    <span class="nav-icon">⚙️</span>
    <span class="nav-label">设置</span>
  </button>
</nav>

<script src="js/icons.js"></script>
<script src="js/db.js"></script>
<script src="js/parser.js"></script>
<script src="js/stats.js"></script>
<script src="js/app.js"></script>

<!-- Service Worker -->
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}
</script>
</body>
</html>
